name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts reads DATABASE_URL at config load; `prisma generate`
      # never connects, so a placeholder is enough.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # `next build` is not run here: several pages prerender from the database
  # at build time, so CI would need a seeded Postgres service container.
  # Add a build job with a postgres service when that becomes worth the cost.
